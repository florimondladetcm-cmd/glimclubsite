<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GLIM CLUB — Voir le monde autrement</title>
    <script type="text/javascript">
      // GitHub Pages serves this file for any unknown path. It re-encodes the
      // requested path into a query string and redirects to index.html, which
      // decodes it back (see the inline script in index.html) before React
      // Router mounts — restoring deep links like /glimclubsite/offres.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
